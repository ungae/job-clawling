name: Daily Job Crawler

on:
  schedule:
    - cron: '0 0 * * *' # 매일 UTC 자정 (한국시간 오전 9시)
  workflow_dispatch: # 수동으로도 실행할 수 있는 버튼 활성화

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Crawler
        run: |
          python run.py

      - name: Commit and Push Updated HTML
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update job postings" && git push)
